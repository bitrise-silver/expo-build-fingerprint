---
format_version: "23"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

trigger_map:
  - push_branch: "*"
    workflow: build_fingerprint
  - pull_request_target_branch: "*"
    workflow: build_fingerprint

workflows:
  build_fingerprint:
    summary: |
      Fingerprints the dependency files into a cache key, checks whether that key is
      already cached, and only runs `expo export` on a cache miss.
    description: |
      Demonstrates the free Bitrise key-value cache "build skip" pattern for Expo:
        1. steps-react-native-fingerprint fingerprints the deps into BUNDLE_HASH_STRING and
           checks the key-value cache for that key (without downloading), setting BUNDLE_CACHE_FOUND.
        2. restore-cache pulls the cached export only when BUNDLE_CACHE_FOUND is "true".
        3. `expo export` runs only on a miss; the export is saved under BUNDLE_HASH_STRING.
      When only App.tsx changes, the dependency fingerprint is unchanged, so subsequent builds
      find the key and skip re-exporting.
    steps:
      - git-clone@8: {}
      - restore-npm-cache@2: {}
      - npm@1:
          title: npm ci
          inputs:
            - command: ci
      - save-npm-cache@1: {}
      - git::https://github.com/bitrise-silver/steps-react-native-fingerprint.git@main:
          title: Fingerprint deps → cache key + hit check
          inputs:
            - file_paths: |-
                package.json
                package-lock.json
            - key_prefix: expo-build-skip
            - verbose: "true"
      - restore-cache@2:
          title: Restore cached Expo export (only if found)
          run_if: '{{ enveq "BUNDLE_CACHE_FOUND" "true" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
      - script@1:
          title: Expo export (cache miss only)
          run_if: '{{ enveq "BUNDLE_CACHE_FOUND" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache miss — running expo export from scratch…"
                npx expo export --platform ios --output-dir dist
      - script@1:
          title: Reuse cached Expo export (cache hit only)
          run_if: '{{ enveq "BUNDLE_CACHE_FOUND" "true" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache hit (key=$BUNDLE_HASH_STRING) — skipping expo export."
                ls -lh dist || true
      - save-cache@2:
          title: Save Expo export for next time (cache miss only)
          run_if: '{{ enveq "BUNDLE_CACHE_FOUND" "false" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
            - paths: dist
      - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: linux-docker-android-22.04
        machine_type_id: g2.linux.medium
